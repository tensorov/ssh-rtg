---
name: lint

on:
  push:
    branches: [main]
    paths:
      - "ansible/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/lint.yml"
      - ".ansible-lint"
      - ".yamllint"
  pull_request:
    branches: [main]
    paths:
      - "ansible/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/lint.yml"
      - ".ansible-lint"
      - ".yamllint"

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install 'ansible-core>=2.13,<2.19' ansible-lint yamllint
          ansible-galaxy collection install community.crypto ansible.posix community.general

      - name: Run yamllint
        run: yamllint --strict ansible/

      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint --config-file ../.ansible-lint .

      - name: Check playbook syntax
        run: |
          cd ansible
          ansible-playbook --syntax-check playbooks/deploy-client.yml
          ansible-playbook --syntax-check playbooks/deploy-server.yml

  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Lint
        run: |
          go vet ./...
      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/rtg-orchestrator/
      - name: Test
        run: go test ./... -v -count=1
