<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <linearGradient id="tunnelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="350" fill="#0f172a"/>
  <rect x="0" y="0" width="800" height="350" fill="url(#grid)"/>

  <!-- Arrows between cards (glowing) -->
  <g filter="url(#glow)">
    <line x1="240" y1="165" x2="285" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="510" y1="165" x2="555" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Bottom flow text -->
  <text x="400" y="338" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui">Internet → VPS → Tunnel → Homelab Services</text>

  <!-- ==================== LEFT CARD: Homelab ==================== -->
  <g filter="url(#cardShadow)">
    <rect x="20" y="30" width="220" height="290" rx="12" fill="#1e293b" stroke="#334155"/>
  </g>
  <rect x="36" y="50" width="168" height="32" rx="6" fill="#0f172a" stroke="#3b82f6"/>
  <text x="120" y="71" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-weight="bold" font-size="12">HOMELAB (NAT)</text>

  <!-- Server unit 1 -->
  <rect x="74" y="104" width="112" height="30" rx="4" fill="#0f172a" stroke="#334155"/>
  <circle cx="86" cy="119" r="3" fill="#22c55e"/>
  <rect x="96" y="111" width="40" height="3" rx="1.5" fill="#334155"/>
  <rect x="96" y="119" width="56" height="3" rx="1.5" fill="#334155"/>
  <rect x="96" y="127" width="30" height="3" rx="1.5" fill="#334155"/>

  <!-- Server unit 2 -->
  <rect x="74" y="144" width="112" height="30" rx="4" fill="#0f172a" stroke="#334155"/>
  <circle cx="86" cy="159" r="3" fill="#22c55e"/>
  <rect x="96" y="151" width="48" height="3" rx="1.5" fill="#334155"/>
  <rect x="96" y="159" width="62" height="3" rx="1.5" fill="#334155"/>
  <rect x="96" y="167" width="34" height="3" rx="1.5" fill="#334155"/>

  <!-- Server unit 3 -->
  <rect x="74" y="184" width="112" height="30" rx="4" fill="#0f172a" stroke="#334155"/>
  <circle cx="86" cy="199" r="3" fill="#22c55e"/>
  <rect x="96" y="191" width="52" height="3" rx="1.5" fill="#334155"/>
  <rect x="96" y="199" width="44" height="3" rx="1.5" fill="#334155"/>
  <rect x="96" y="207" width="38" height="3" rx="1.5" fill="#334155"/>

  <!-- Service badges -->
  <rect x="36" y="240" width="68" height="28" rx="5" fill="#172554" stroke="#1d4ed8"/>
  <text x="70" y="259" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11">SSH</text>

  <rect x="116" y="240" width="68" height="28" rx="5" fill="#172554" stroke="#1d4ed8"/>
  <text x="150" y="259" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11">HTTP</text>

  <rect x="76" y="278" width="68" height="28" rx="5" fill="#172554" stroke="#1d4ed8"/>
  <text x="110" y="297" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11">TCP</text>

  <!-- ==================== MIDDLE CARD: SSH Tunnel ==================== -->
  <g filter="url(#cardShadow)">
    <rect x="290" y="30" width="220" height="290" rx="12" fill="#1e293b" stroke="#334155"/>
  </g>
  <rect x="306" y="50" width="168" height="32" rx="6" fill="#0f172a" stroke="#3b82f6"/>
  <text x="390" y="71" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-weight="bold" font-size="12">SSH TUNNEL</text>

  <!-- Tunnel pipe outer -->
  <rect x="310" y="110" width="180" height="44" rx="22" fill="url(#tunnelGrad)" stroke="#334155"/>
  <!-- Tunnel pipe inner bore -->
  <rect x="315" y="119" width="170" height="26" rx="13" fill="#0f172a"/>

  <!-- Direction arrows inside bore -->
  <path d="M330 132 L338 128 L338 136 Z" fill="#3b82f6" opacity="0.6"/>
  <path d="M345 132 L353 128 L353 136 Z" fill="#3b82f6" opacity="0.4"/>
  <path d="M360 132 L368 128 L368 136 Z" fill="#3b82f6" opacity="0.25"/>

  <!-- Lock badge -->
  <rect x="376" y="112" width="48" height="40" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="388" y="122" width="24" height="18" rx="3" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <path d="M393 122 V117 A7 7 0 0 1 407 117 V122" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="400" cy="129" r="2.5" fill="#3b82f6"/>
  <rect x="398.5" y="131" width="3" height="4" rx="1" fill="#3b82f6"/>

  <!-- SSH command -->
  <rect x="316" y="178" width="168" height="26" rx="5" fill="#0f172a" stroke="#334155"/>
  <text x="400" y="195" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">ssh -R 0.0.0.0:PORT:…</text>

  <!-- Connection info -->
  <rect x="330" y="218" width="140" height="24" rx="4" fill="#0f172a" stroke="#334155"/>
  <text x="400" y="234" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">Single outbound connection</text>

  <!-- AES badge -->
  <rect x="340" y="254" width="120" height="24" rx="4" fill="#052e16" stroke="#22c55e"/>
  <text x="400" y="270" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="9">AES-256-GCM Encrypted</text>

  <!-- ==================== RIGHT CARD: VPS + Users ==================== -->
  <g filter="url(#cardShadow)">
    <rect x="560" y="30" width="220" height="290" rx="12" fill="#1e293b" stroke="#334155"/>
  </g>
  <rect x="576" y="50" width="168" height="32" rx="6" fill="#0f172a" stroke="#3b82f6"/>
  <text x="660" y="71" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-weight="bold" font-size="12">VPS (PUBLIC)</text>

  <!-- Cloud icon -->
  <g transform="translate(660, 128)">
    <path d="M-28 20 A14 14 0 0 1 -14 -6 A20 20 0 0 1 16 -14 A16 16 0 0 1 36 0 A12 12 0 0 1 36 20 Z" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="4" y="14" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Traefik</text>
  </g>

  <!-- Traefik routing -->
  <rect x="586" y="180" width="168" height="24" rx="5" fill="#0f172a" stroke="#334155"/>
  <text x="670" y="196" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">TLS termination + routing</text>

  <!-- Ports badge -->
  <rect x="586" y="218" width="168" height="24" rx="5" fill="#0f172a" stroke="#334155"/>
  <text x="670" y="234" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11">:80  :443  :22</text>

  <!-- Separator -->
  <line x1="586" y1="258" x2="754" y2="258" stroke="#334155" stroke-width="1"/>

  <!-- Internet users -->
  <circle cx="640" cy="275" r="5" fill="#475569"/>
  <path d="M630 290 Q635 282 640 282 Q645 282 650 290" fill="none" stroke="#475569" stroke-width="1.5"/>
  <circle cx="680" cy="275" r="5" fill="#475569"/>
  <path d="M670 290 Q675 282 680 282 Q685 282 690 290" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="660" y="308" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">Internet Users</text>
</svg>
