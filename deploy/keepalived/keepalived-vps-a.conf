# Keepalived config — VPS A (primary)
# =====================================
# VRID: 51  |  Virtual IP: 10.0.0.10/24
# Priority: 100  |  State: MASTER
#
# Before using:
#   1. Replace REPLACE_WITH_SECURE_PASSWORD with the password from keepalived.auth
#   2. Change interface if not eth0
#   3. Adjust virtual_router_id if 51 conflicts on your network segment

vrrp_script chk_traefik {
    script "/usr/bin/systemctl is-active traefik"
    interval 2
    fall 2
    rise 2
}

vrrp_instance VI_51 {
    state MASTER
    interface eth0                    # change to your interface
    virtual_router_id 51
    priority 100
    advert_int 1
    preempt

    authentication {
        auth_type PASS
        auth_pass REPLACE_WITH_SECURE_PASSWORD
    }

    virtual_ipaddress {
        10.0.0.10/24
    }

    track_script {
        chk_traefik
    }
}
