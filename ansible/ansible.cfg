# ── ansible.cfg ──────────────────────────────────────────
[defaults]
host_key_checking = False
remote_user = root
gathering = smart
stdout_callback = yaml

# Roles path (relative to ansible/ dir)
roles_path = roles

# Fork limit for parallel tasks
forks = 10

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
