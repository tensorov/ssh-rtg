---
# ssh-tunnel-server tasks — configure VPS to accept reverse SSH tunnels.
# Creates tunnel user, configures Traefik TCP routes, firewall, and sysctl.

- name: Create Traefik dynamic config directory
  ansible.builtin.file:
    path: "{{ ssh_tunnel_traefik_routes_dir }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  notify: restart traefik

- name: Template Traefik TCP route configuration
  ansible.builtin.template:
    src: traefik-tcp-routes.yml.j2
    dest: "{{ ssh_tunnel_traefik_config_file }}"
    mode: "0644"
    owner: root
    group: root
  notify: restart traefik

- name: Include firewall configuration
  ansible.builtin.include_tasks:
    file: firewall.yml
  tags:
    - firewall

- name: Enable IP forwarding in sysctl.conf
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  when: ssh_tunnel_enable_ip_forwarding | bool

- name: Create tunnel system user
  ansible.builtin.user:
    name: "{{ ssh_tunnel_server_user }}"
    state: present
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    comment: "Reverse SSH tunnel user"

- name: Ensure GatewayPorts is enabled in sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?GatewayPorts\s'
    line: 'GatewayPorts yes'
    state: present
  notify: restart sshd

- name: Ensure GatewayPorts is not commented after the line
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*#\s*GatewayPorts'
    line: 'GatewayPorts yes'
    state: present
  notify: restart sshd

- name: Install socat for UDP bridges
  ansible.builtin.package:
    name: socat
    state: present
  when: ssh_tunnel_server_udp_bridges | length > 0

- name: Template UDP bridge systemd service
  ansible.builtin.template:
    src: udp-bridge.service.j2
    dest: "/etc/systemd/system/udp-bridge-{{ item.name }}.service"
    mode: "0644"
  loop: "{{ ssh_tunnel_server_udp_bridges }}"
  notify: restart udp bridges

- name: Validate Traefik entryPoints exist for each tunnel port
  ansible.builtin.shell:
    cmd: |
      for port in {{ ssh_tunnel_ports | map(attribute='remote_port') | join(' ') }}; do
        if ! grep -q "tunnel-${port}:" /etc/traefik/traefik.yml 2>/dev/null; then
          echo "MISSING: entryPoint tunnel-${port} not found in /etc/traefik/traefik.yml"
        fi
      done
    warn: false
  changed_when: false
  register: _entrypoint_check
  failed_when: _entrypoint_check.stdout_lines | length > 0
